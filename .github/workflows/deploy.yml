# .github/workflows/deploy.yml
# Builds crawler + api Docker images in parallel, pushes to GCP Artifact Registry.
# Deploy job (SSH to GCE) is in the same file and runs after both images push.
# Triggered: push to main + manual workflow_dispatch.
#
# Required GitHub Secrets (see .github/secrets.md):
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   GCE_SSH_PRIVATE_KEY, GCE_SSH_HOST, GCE_SSH_USER, GCE_SSH_KNOWN_HOSTS
name: Build, Push, Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    strategy:
      matrix:
        include:
          # crawler needs monorepo root context — its Dockerfile copies workspace files
          # (package.json, pnpm-workspace.yaml, shared-types/) from the repo root.
          - app: crawler
            dockerfile: apps/crawler/Dockerfile
            context: .
          # api is a standalone .NET app — context scoped to apps/api/ so that
          # COPY *.csproj finds the .csproj file. No monorepo dependencies.
          - app: api
            dockerfile: apps/api/Dockerfile
            context: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to Artifact Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/webcrawler/${{ matrix.app }}:${{ github.sha }}
            asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/webcrawler/${{ matrix.app }}:latest
          cache-from: type=registry,ref=asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/webcrawler/${{ matrix.app }}:cache
          cache-to: type=registry,ref=asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/webcrawler/${{ matrix.app }}:cache,mode=max


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH deploy to GCE VM
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.GCE_SSH_HOST }}
          username: ${{ secrets.GCE_SSH_USER }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          fingerprint: ${{ secrets.GCE_SSH_KNOWN_HOSTS }}
          envs: IMAGE_TAG
          command_timeout: 10m
          script: |
            set -e
            cd /opt/webcrawler

            # Update IMAGE_TAG in .env.prod in-place (preserves all other secrets)
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.prod
            grep -q "^IMAGE_TAG=" .env.prod || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.prod

            # Pull new images for crawler and api only (skip postgres/redis/nginx)
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull crawler api

            # Restart only crawler and api (--no-deps skips postgres/redis/nginx restart)
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps crawler api

            # Wait for API healthcheck (up to 90 seconds)
            echo "Waiting for API healthcheck..."
            timeout 90 bash -c 'until curl -sf http://localhost:5000/health > /dev/null; do echo "  still waiting..."; sleep 5; done'

            echo "Deploy SUCCESS: IMAGE_TAG=${IMAGE_TAG}"
