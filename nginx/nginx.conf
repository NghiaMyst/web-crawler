# Nginx config for Web Crawler production deployment.
# Reverse proxy: API + SignalR (/hubs/) at https://webcrawler-myst.duckdns.org.
# Source: nginx.org/en/docs/http/websocket.html
#         learn.microsoft.com/en-us/aspnet/core/signalr/scale

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # CRITICAL for SignalR — handles both Upgrade (WebSocket) and regular HTTP.
    # Without this, SignalR silently falls back to Long Polling.
    map $http_connection $connection_upgrade {
        "~*Upgrade" $http_connection;
        default     keep-alive;
    }

    # Grafana Live WebSocket upgrade — uses DIFFERENT output variable to avoid nginx
    # "duplicate map variable" error with the SignalR map above.
    map $http_upgrade $grafana_connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP -> HTTPS redirect (no /.well-known/ exception — we use DNS-01, not HTTP-01).
    server {
        listen 80;
        server_name webcrawler-myst.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS — terminates TLS, proxies to api:5000.
    server {
        listen 443 ssl;
        server_name webcrawler-myst.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/webcrawler-myst.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/webcrawler-myst.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Grafana UI — proxied from /grafana/ subpath.
        # Basic auth provided by nginx; Grafana's own login is secondary.
        location /grafana/ {
            auth_basic "Grafana";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://grafana:3000;
            rewrite ^/grafana/(.*) /$1 break;
        }

        # Grafana Live — WebSocket for real-time dashboard updates.
        location /grafana/api/live/ {
            auth_basic "Grafana";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $grafana_connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://grafana:3000;
            rewrite ^/grafana/(.*) /$1 break;
        }

        # SignalR hub — needs HTTP/1.1 + Upgrade for WebSockets.
        location /hubs/ {
            proxy_pass http://api:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache off;
            proxy_buffering off;
            proxy_read_timeout 100s;
        }

        # API + everything else.
        location / {
            proxy_pass http://api:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
